name: Build iOS IPA (unsigned, sideloadable package)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - '**/readaloud**'
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  build-ios:
    name: Build unsigned iOS archive + sideloadable IPA
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Audit Flureadium plugin registration
        run: |
          if [ ! -f .flutter-plugins-dependencies ]; then
            echo "::error::.flutter-plugins-dependencies not found after flutter pub get."
            exit 1
          fi

          python3 - <<'PY'
          import json
          import sys

          with open(".flutter-plugins-dependencies", "r", encoding="utf-8") as f:
            data = json.load(f)

          ios_plugins = data.get("plugins", {}).get("ios", [])
          names = {plugin.get("name") for plugin in ios_plugins if isinstance(plugin, dict)}

          if "flureadium" not in names:
            print("::error::Flureadium is missing from iOS plugin registration.")
            print(f"Registered iOS plugins: {sorted(n for n in names if n)}")
            sys.exit(1)

          print("Flureadium is registered for iOS.")
          PY

      - name: Install CocoaPods
        run: |
          cd ios
          pod --version
          pod repo list
          pod install --repo-update --verbose
          cd ..

      - name: Audit Readium pod resolution
        run: |
          if ! grep -Eiq "flureadium|readium|r2shared|r2streamer|swift-toolkit" ios/Podfile.lock; then
            echo "::error::Expected Flureadium/Readium pods were not resolved in ios/Podfile.lock."
            echo "::error::Check Podfile sources and plugin podspec dependency graph."
            exit 1
          fi

      - name: Build iOS archive (no codesign)
        run: flutter build ipa --release --no-codesign

      - name: Create sideloadable IPA from Runner.app
        run: |
          APP_PATH="$(find build/ios/archive -type d -name Runner.app | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "Runner.app not found in archive output"
            exit 1
          fi

          mkdir -p build/ios/sideload/Payload
          cp -R "$APP_PATH" build/ios/sideload/Payload/

          mkdir -p build/ios/ipa
          (
            cd build/ios/sideload
            /usr/bin/zip -qry ../ipa/Absorb-unsigned-sideloadable.ipa Payload
          )

      - name: Upload unsigned sideloadable iOS IPA
        uses: actions/upload-artifact@v6
        with:
          name: Absorb-iOS-unsigned-sideloadable-ipa
          path: |
            build/ios/ipa/Absorb-unsigned-sideloadable.ipa
            build/ios/ipa/*.ipa
            build/ios/archive/*.xcarchive
          retention-days: 30
