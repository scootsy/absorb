name: absorb
description: An Audiobookshelf Client
publish_to: 'none'
version: 1.8.27+53

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  
  # Networking
  http: ^1.1.0
  socket_io_client: ^3.0.2
  
  # State Management
  provider: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Dynamic Color (Material You)
  dynamic_color: ^1.6.8
  
  # Image caching
  cached_network_image: ^3.3.0
  
  # Icons
  material_design_icons_flutter: ^7.0.7296
  
  # Audio playback
  just_audio:
    path: packages/just_audio
    
  audio_service: ^0.18.13
  
  # Permissions
  permission_handler: ^12.0.1
  
  # Downloads & offline
  path_provider: ^2.1.1
  connectivity_plus: ^6.0.3
  
  # Shake detection for sleep timer
  sensors_plus: ^4.0.2

  # Download notifications
  flutter_local_notifications: ^17.2.1

  device_info_plus: ^11.0.0

  # choose file location
  file_picker: ^8.0.0

  package_info_plus: ^8.0.0

  #OIDC
  crypto: ^3.0.3
  url_launcher: ^6.2.5
  flutter_web_auth_2: ^5.0.1

  # Pausing for interruptions
  audio_session: ^0.1.21

  # chromecast
  flutter_chrome_cast: ^1.2.6

  # Log sharing
  share_plus: ^10.0.0

  # Homescreen widget
  home_widget: ^0.7.0

  # Splash screen (preserve during init)
  flutter_native_splash: ^2.4.4
  vibration: ^3.1.8
  webview_flutter: ^4.13.1
  flutter_markdown_plus: ^1.0.7
  wakelock_plus: ^1.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3
  change_app_package_name: ^1.5.0
  rename_app: ^1.6.5

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter_native_splash:
  color: "#000000"
  image: "assets/icon/splash_logo.png"
  android_12:
    color: "#000000"
    image: "assets/icon/splash_logo.png"
  ios: true
